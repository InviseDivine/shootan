name: Build

on: [push, pull_request]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: jwlawson/actions-setup-cmake@v2

      - name: Configure
        run: cmake -B build

      - name: Build
        run: cmake --build build --config Release
        
      - name: Archive
        run: cmake -E tar cfv game.zip --format=zip build/